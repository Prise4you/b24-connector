name: B24 → NotebookLM Sync

on:
  # Вызов из webhook.php при событии в Б24 + ручная полная инвентаризация
  # NotebookLM-аккаунта из админки (кнопка «Сканировать аккаунт») + ручной
  # тест ежемесячного дайджеста (см. job digest)
  repository_dispatch:
    types: [sync_trigger, full_inventory_trigger, digest_trigger, ask_trigger]

  # Резервное расписание: часовой синк + ежемесячный дайджест проектов
  # (1 число месяца, 06:00 UTC — job digest ниже матчит именно эту вторую
  # строку по точному значению github.event.schedule, sync — первую)
  schedule:
    - cron: '0 * * * *'
    - cron: '0 6 1 * *'

  # Ручной запуск через интерфейс GitHub (только job sync — см. его if:)
  workflow_dispatch:

# КРИТИЧНО: сессию NotebookLM (NLM_STORAGE_STATE) может использовать только
# ОДИН процесс одновременно — Google инвалидирует её при параллельном
# использовании с разных IP (защита от угона сессии, проверено на реальных
# прогонах: matrix-джобы стабильно получали "Authentication expired").
# Поэтому sync/full_inventory/digest сериализованы группой nlm-session
# (задана на уровне КАЖДОГО из этих job'ов ниже, не здесь).
#
# ВАЖНО: concurrency НЕ задаётся здесь, на уровне workflow — если задать
# её и на workflow, и на job, GitHub требует свободными ОБЕ группы разом
# (сам workflow-level запуск ставится в очередь до того, как дело доходит
# до job-level групп). На практике это проявилось так: ask_trigger повис
# в статусе pending на весь час-полтора часового sync, хотя ask использует
# СВОЮ отдельную группу nlm-session-ask — потому что unnamed workflow-level
# group здесь раньше существовала и блокировала запуск самого run'а любого
# job'а этого workflow, независимо от его собственной группы. Держать
# concurrency только на job-level — единственный способ дать ask реально
# не ждать sync.

jobs:
  # Один последовательный процесс на все проекты + CRM. Параллельная
  # matrix-версия (по job'у на проект) откатена — см. комментарий про
  # concurrency выше. Таймаут поднят 60→90 мин (2026-07-13), затем 90→180
  # (2026-07-18): за неделю объём данных вырос, 90 мин стало вновь впритык —
  # 6 прогонов подряд убито по таймауту посреди обработки проекта. Репозиторий
  # публичный намеренно ради безлимитных минут GitHub Actions, поэтому смысла
  # экономить на таймауте нет — взят запас x2 над наблюдаемым временем прогона.
  # Критично для самообновляющейся сессии (persist_nlm_session вызывается
  # только в самом конце main(), после всех проектов; не дойдя до конца,
  # ротированная сессия никогда не сохранится на хостинг).
  sync:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 * * * *') ||
      (github.event_name == 'repository_dispatch' && github.event.action == 'sync_trigger') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    concurrency:
      group: nlm-session
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      # Seed: восстановить сессию из секрета на случай холодного старта (нет
      # живой копии на хостинге). Коннектор дальше сам предпочтёт живую копию
      # с --nlm-session-url, если она есть, и сохранит ротированную обратно.
      - name: Restore NotebookLM session (seed)
        run: |
          mkdir -p ~/.notebooklm/profiles/default
          echo "${{ secrets.NLM_STORAGE_STATE }}" | base64 -d \
            > ~/.notebooklm/profiles/default/storage_state.json

      - name: Run connector
        env:
          NLM_BIN: notebooklm
          CONNECTOR_TOKEN: ${{ secrets.CONNECTOR_TOKEN }}
        run: |
          python connector.py \
            --config-url https://anitconf.ru/ntlm/api/config.php \
            --status-url https://anitconf.ru/ntlm/api/status.php \
            --nlm-session-url https://anitconf.ru/ntlm/api/nlm_session.php \
            --connector-token "$CONNECTOR_TOKEN"

  # Полная инвентаризация NotebookLM-аккаунта — ТОЛЬКО по ручному запросу
  # из админки (кнопка «Сканировать аккаунт»), не участвует в плановом/webhook
  # синке. Та же concurrency-группа (job-level, см. sync выше) гарантирует,
  # что инвентаризация не пересечётся с синком по сессии NotebookLM.
  full_inventory:
    if: github.event_name == 'repository_dispatch' && github.event.action == 'full_inventory_trigger'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: nlm-session
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Restore NotebookLM session (seed)
        run: |
          mkdir -p ~/.notebooklm/profiles/default
          echo "${{ secrets.NLM_STORAGE_STATE }}" | base64 -d \
            > ~/.notebooklm/profiles/default/storage_state.json

      - name: Run full inventory
        env:
          NLM_BIN: notebooklm
          CONNECTOR_TOKEN: ${{ secrets.CONNECTOR_TOKEN }}
        run: |
          python connector.py \
            --status-url https://anitconf.ru/ntlm/api/status.php \
            --nlm-session-url https://anitconf.ru/ntlm/api/nlm_session.php \
            --connector-token "$CONNECTOR_TOKEN" \
            --full-inventory

  # Ежемесячный дайджест проектов (digest.enabled=true в config.json) →
  # AFFiNE. Два независимых шага: connector.py --digest спрашивает
  # NotebookLM и пишет connector/out/digest_payload.json; отдельный
  # Node-скрипт читает этот файл и пушит markdown в AFFiNE через
  # affine-mcp-server (HTTP-транспорт) — connector.py ничего не знает про
  # AFFiNE/Node. Та же concurrency-группа (job-level, см. sync выше) — не
  # пересекается по сессии NotebookLM с sync/full_inventory.
  digest:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 6 1 * *') ||
      (github.event_name == 'repository_dispatch' && github.event.action == 'digest_trigger')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    concurrency:
      group: nlm-session
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      # Версия зафиксирована сознательно: affine-mcp-server — неофициальный
      # пакет поверх недокументированного протокола AFFiNE, бампать только
      # после явного повторного теста.
      - name: Install affine-mcp-server (pinned)
        run: npm install -g affine-mcp-server@2.5.0

      - name: Install Node deps for push script
        working-directory: scripts
        run: npm install

      - name: Restore NotebookLM session (seed)
        run: |
          mkdir -p ~/.notebooklm/profiles/default
          echo "${{ secrets.NLM_STORAGE_STATE }}" | base64 -d \
            > ~/.notebooklm/profiles/default/storage_state.json

      - name: Run digest (Bitrix24/NotebookLM side)
        env:
          NLM_BIN: notebooklm
          CONNECTOR_TOKEN: ${{ secrets.CONNECTOR_TOKEN }}
        run: |
          python connector.py \
            --config-url https://anitconf.ru/ntlm/api/config.php \
            --status-url https://anitconf.ru/ntlm/api/status.php \
            --nlm-session-url https://anitconf.ru/ntlm/api/nlm_session.php \
            --connector-token "$CONNECTOR_TOKEN" \
            --digest

      - name: Push digest(s) to AFFiNE
        env:
          AFFINE_BASE_URL: https://know.anitconf.ru
          AFFINE_WORKSPACE_ID: 87ff733f-41dd-4559-95ed-15989bcc772b
          AFFINE_API_TOKEN: ${{ secrets.AFFINE_API_TOKEN }}
        run: node scripts/affine_digest_push.mjs

  # Интерактивный ask-запрос из вкладки проекта в Б24 (SONET_GROUP_DETAIL_TAB) —
  # ровно один вопрос за раз, request_id/group_id/command_id приходят из
  # client_payload (admin/api/ask.php). Своя concurrency-группа (job-level,
  # не пересекается с nlm-session у sync/full_inventory/digest) — использует
  # ВТОРОЙ независимый логин NotebookLM (тот же Google-аккаунт, отдельная cookie-
  # цепочка), поэтому не встаёт в очередь за часовым sync/digest (тот занят
  # большую часть времени — 50-90 мин на прогон, ждать столько для быстрого
  # интерактивного вопроса неприемлемо). Раннер эфемерный и изолированный
  # от раннера job'а sync, поэтому локальный путь профиля CLI может
  # оставаться тем же (~/.notebooklm/profiles/default) — коллизия сессий
  # возникает на стороне Google при ПАРАЛЛЕЛЬНОМ использовании одной и той
  # же cookie-цепочки, а не от одинакового локального пути на разных
  # раннерах; здесь цепочка изначально другая (отдельный секрет-сид).
  ask:
    if: github.event_name == 'repository_dispatch' && github.event.action == 'ask_trigger'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: nlm-session-ask
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      # Seed из ВТОРОГО секрета (второй независимый логин) — не пересекается
      # с NLM_STORAGE_STATE, используемым sync/full_inventory/digest.
      - name: Restore NotebookLM session (seed, isolated ask profile)
        run: |
          mkdir -p ~/.notebooklm/profiles/default
          echo "${{ secrets.NLM_STORAGE_STATE_ASK }}" | base64 -d \
            > ~/.notebooklm/profiles/default/storage_state.json

      - name: Run ask
        env:
          NLM_BIN: notebooklm
          CONNECTOR_TOKEN: ${{ secrets.CONNECTOR_TOKEN }}
        run: |
          python connector.py \
            --config-url https://anitconf.ru/ntlm/api/config.php \
            --status-url https://anitconf.ru/ntlm/api/status.php \
            --nlm-session-url https://anitconf.ru/ntlm/api/nlm_session_ask.php \
            --connector-token "$CONNECTOR_TOKEN" \
            --ask \
            --ask-request-id "${{ github.event.client_payload.request_id }}" \
            --ask-group-id "${{ github.event.client_payload.group_id }}" \
            --ask-command-id "${{ github.event.client_payload.command_id }}"
