name: B24 → NotebookLM Sync

on:
  # Вызов из webhook.php при событии в Б24
  repository_dispatch:
    types: [sync_trigger]

  # Резервное расписание: раз в час (если webhook пропустил событие)
  schedule:
    - cron: '0 * * * *'

  # Ручной запуск через интерфейс GitHub
  workflow_dispatch:

jobs:
  # Узнаём список проектов из конфига на хостинге, чтобы разложить их по
  # отдельным параллельным job'ам ниже (matrix). Без этого один процесс
  # обходил все проекты последовательно и с новыми, более тяжёлыми фичами
  # (содержимое файлов диска, дедуп, CRM-таймлайн) стал упираться в лимит
  # времени job'а даже с несколькими проектами сразу.
  discover:
    runs-on: ubuntu-latest
    outputs:
      groups: ${{ steps.list.outputs.groups }}
    steps:
      - id: list
        env:
          CONNECTOR_TOKEN: ${{ secrets.CONNECTOR_TOKEN }}
        run: |
          set +e
          curl -sS -w '\nHTTP_%{http_code}' "https://anitconf.ru/ntlm/api/config.php?raw=1" \
            -H "X-Connector-Token: $CONNECTOR_TOKEN" > /tmp/cfg_response.txt
          echo "--- curl вернул: ---"
          tail -c 300 /tmp/cfg_response.txt
          echo
          GROUPS=$(python3 -c "
          import json
          with open('/tmp/cfg_response.txt') as f:
              raw = f.read().rsplit('HTTP_', 1)[0]
          d = json.loads(raw)
          print(json.dumps([int(p['group_id']) for p in d.get('projects', [])]))
          ")
          if [ -z "$GROUPS" ]; then
            echo "Не удалось получить список проектов" >&2
            exit 1
          fi
          echo "groups=$GROUPS" >> "$GITHUB_OUTPUT"
          echo "Проекты: $GROUPS"

  sync:
    needs: discover
    if: needs.discover.outputs.groups != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        group_id: ${{ fromJson(needs.discover.outputs.groups) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Restore NotebookLM session
        run: |
          mkdir -p ~/.notebooklm/profiles/default
          echo "${{ secrets.NLM_STORAGE_STATE }}" | base64 -d \
            > ~/.notebooklm/profiles/default/storage_state.json

      - name: Run connector (project ${{ matrix.group_id }})
        env:
          NLM_BIN: notebooklm
          CONNECTOR_TOKEN: ${{ secrets.CONNECTOR_TOKEN }}
        run: |
          python connector.py \
            --config-url https://anitconf.ru/ntlm/api/config.php \
            --status-url https://anitconf.ru/ntlm/api/status.php \
            --connector-token "$CONNECTOR_TOKEN" \
            --group ${{ matrix.group_id }}

  sync_crm:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Restore NotebookLM session
        run: |
          mkdir -p ~/.notebooklm/profiles/default
          echo "${{ secrets.NLM_STORAGE_STATE }}" | base64 -d \
            > ~/.notebooklm/profiles/default/storage_state.json

      - name: Run connector (CRM only)
        env:
          NLM_BIN: notebooklm
          CONNECTOR_TOKEN: ${{ secrets.CONNECTOR_TOKEN }}
        run: |
          python connector.py \
            --config-url https://anitconf.ru/ntlm/api/config.php \
            --status-url https://anitconf.ru/ntlm/api/status.php \
            --connector-token "$CONNECTOR_TOKEN" \
            --crm-only
